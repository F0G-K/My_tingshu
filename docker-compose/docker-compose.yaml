version: '3.8'

networks:
  elastic:
    driver: bridge

services:
  # MySQL 8.0.29
  mysql:
    image: mysql:8.0.29
    container_name: tingshu_mysql
    restart: no
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: Atguigu.123
      TZ: Asia/Shanghai
    volumes:
      # 在当前目录下自动创建 mysql_data 文件夹，安全隔离
      - ./mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pAtguigu.123"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - elastic

  # Redis 7.0.10
  redis:
    image: redis:7.0.10
    container_name: tingshu_redis
    restart: no
    ports:
      - "6379:6379"
    volumes:
      # 完美对应你截图里的 redis/redis.conf
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - elastic

  # Nacos 2.1.1
  nacos:
    image: nacos/nacos-server:v2.1.1
    platform: linux/amd64
    container_name: tingshu_nacos
    restart: no
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_USER: root
      # 【已修复】密码已同步调整为 Atguigu.123，确保 Nacos 能正常连上 MySQL
      MYSQL_SERVICE_PASSWORD: Atguigu.123
      MYSQL_SERVICE_DB_NAME: nacos_config
      # MySQL 8 使用 caching_sha2_password，容器内 JDBC 需允许公钥检索
      MYSQL_SERVICE_DB_PARAM: characterEncoding=utf8&connectTimeout=10000&socketTimeout=30000&autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - elastic

  # Seata 1.6.1
  seata:
    image: seataio/seata-server:1.6.1
    container_name: tingshu_seata
    restart: no
    ports:
      - "8091:8091"
      - "7091:7091"
    environment:
      - SEATA_PORT=8091
      - SEATA_CONFIG_NAME=file:/root/seata-config/registry
      - TZ=Asia/Shanghai
    volumes:
      # 完美对应你截图里的 seata-config 文件夹
      - ./seata-config:/root/seata-config
    depends_on:
      - nacos
    networks:
      - elastic

  # Elasticsearch 8.5.0
  elasticsearch:
    image: elasticsearch:8.5.0
    container_name: tingshu_elasticsearch
    restart: no
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      TZ: Asia/Shanghai
      xpack.security.enabled: "false"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - elastic

  # Logstash 8.5.0
  logstash:
    image: logstash:8.5.0
    container_name: tingshu_logstash
    restart: no
    ports:
      - "5044:5044"
    volumes:
      # 完美对应你截图里的 logstash.conf 文件
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    depends_on:
      - elasticsearch
    networks:
      - elastic

  # Kibana 8.5.0
  kibana:
    image: kibana:8.5.0
    container_name: tingshu_kibana
    restart: unless-stopped
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - elastic

  # Zipkin
  zipkin:
    image: openzipkin/zipkin
    container_name: tingshu_zipkin
    restart: no
    ports:
      - "9411:9411"
    networks:
      - elastic

  # MinIO
  minio:
    image: minio/minio
    container_name: tingshu_minio
    restart: no
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123456
    volumes:
      # 在当前目录下自动创建 minio_data 目录，防权限报错
      - ./minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - elastic

  # MongoDB (for Yapi)
  mongo:
    image: mongo:4.2.5
    container_name: tingshu_mongo
    restart: no
    ports:
      - "27017:27017"
    volumes:
      # 在当前目录下自动创建 mongo_data 目录
      - ./mongo_data:/data/db
    networks:
      - elastic

  # Yapi
  yapi:
    image: registry.cn-hangzhou.aliyuncs.com/anoy/yapi
    container_name: tingshu_yapi
    restart: no
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    working_dir: /api/vendors
    command: server/app.js
    networks:
      - elastic

  # RabbitMQ 3.12.0
  rabbitmq:
    image: rabbitmq:3.12.0-management
    container_name: tingshu_rabbitmq
    restart: no
    ports:
      - "5672:5672"
      - 15672:15672
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    volumes:
      - mq-plugins:/plugins
    networks:
      - elastic

# 使用 Docker 内部管理的具名卷，对 Mac 系统目录零污染
volumes:
  mq-plugins:
  es_data: